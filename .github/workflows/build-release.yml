name: Build Release APK

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate release keystore
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/brownpaper-release.jks"
          STORE_PASSWORD="$(openssl rand -hex 16)"
          KEY_PASSWORD="$STORE_PASSWORD"
          KEY_ALIAS="brownpaper-ci"

          keytool -genkeypair \
            -keystore "$KEYSTORE_PATH" \
            -storetype PKCS12 \
            -storepass "$STORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 3650 \
            -dname "CN=BrownPaper CI, OU=CI, O=BrownPaper, L=Unknown, S=Unknown, C=US"

          {
            echo "CI_RELEASE_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "CI_RELEASE_STORE_PASSWORD=$STORE_PASSWORD"
            echo "CI_RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "CI_RELEASE_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Decode release keystore from secrets
        env:
          CI_RELEASE_KEYSTORE_BASE64: ${{ secrets.CI_RELEASE_KEYSTORE_BASE64 }}
          CI_RELEASE_STORE_PASSWORD: ${{ secrets.CI_RELEASE_STORE_PASSWORD }}
          CI_RELEASE_KEY_ALIAS: ${{ secrets.CI_RELEASE_KEY_ALIAS }}
          CI_RELEASE_KEY_PASSWORD: ${{ secrets.CI_RELEASE_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/brownpaper-release-secret.jks"

          if [ -z "$CI_RELEASE_KEYSTORE_BASE64" ] ||
             [ -z "$CI_RELEASE_STORE_PASSWORD" ] ||
             [ -z "$CI_RELEASE_KEY_ALIAS" ] ||
             [ -z "$CI_RELEASE_KEY_PASSWORD" ]; then
            echo "::error::Missing release signing secrets. Add CI_RELEASE_KEYSTORE_BASE64, CI_RELEASE_STORE_PASSWORD, CI_RELEASE_KEY_ALIAS, and CI_RELEASE_KEY_PASSWORD."
            exit 1
          fi

          printf '%s' "$CI_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          {
            echo "CI_RELEASE_KEYSTORE_PATH=$KEYSTORE_PATH"
            echo "CI_RELEASE_STORE_PASSWORD=$CI_RELEASE_STORE_PASSWORD"
            echo "CI_RELEASE_KEY_ALIAS=$CI_RELEASE_KEY_ALIAS"
            echo "CI_RELEASE_KEY_PASSWORD=$CI_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Verify release keystore
        run: |
          test -s "$CI_RELEASE_KEYSTORE_PATH"
          keytool -list \
            -keystore "$CI_RELEASE_KEYSTORE_PATH" \
            -storepass "$CI_RELEASE_STORE_PASSWORD" \
            -alias "$CI_RELEASE_KEY_ALIAS" \
            >/dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Assemble release APK
        run: gradle :app:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: brownpaper-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
